<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sol's RNG Full Engine</title>
    <style>
        body { font-family: sans-serif; background: #121214; color: #e1e1e6; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: auto; text-align: left; }
        .panel { background: #1a1a1e; padding: 15px; border-radius: 8px; border: 1px solid #2e2e35; }
        button { background: #6200ee; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tab-content { margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Sol's RNG Overhaul</h2>
    <div id="display-nickname" style="color: #00ffcc; font-weight: bold;"></div>
    <p>Rolls: <span id="r-count">0</span> | Luck: <span id="r-luck">1.0</span>x | Prestige: <span id="p-lvl">0</span></p>

    <div class="grid">
        <div class="panel">
            <div id="a-name" style="font-size: 2rem; font-weight: bold;">Ready</div>
            <button id="roll-btn" onclick="startRoll()" style="width: 100%; height: 50px;">ROLL</button>
        </div>

        <div class="panel">
            <div class="inv-section-title">☁️ Cloud Save & Load</div>
            <textarea id="save-code-box" style="width: 100%; height: 50px; background: #222; color: #00ffcc; font-size: 0.7rem;" readonly></textarea>
            <button onclick="copySaveCode()">📋 Copy</button>
            <button onclick="importFromCode()">📥 Load</button>
            <hr>
            <div id="alchemy">
                <h3>🧪 Alchemy</h3>
                <button onclick="brewPotion()">Brew Lucky Potion</button>
            </div>
            <div id="prestige">
                <h3>⭐ Prestige</h3>
                <button onclick="prestige()">Ascend (10k Rolls)</button>
            </div>
        </div>
    </div>

    <script>
        let p = { nickname: "", rolls: 0, prestige: 0, inv: { Common: 0, Solar: 0, Chromatic: 0 } };

        function init() {
            let name = prompt("Enter your nickname:");
            p.nickname = name || "Player";
            document.getElementById("display-nickname").textContent = p.nickname;
            updateUI();
        }

        function updateUI() {
            document.getElementById("r-count").textContent = p.rolls;
            document.getElementById("p-lvl").textContent = p.prestige;
            updateSaveCodeDisplay();
        }

        function startRoll() {
            p.rolls++;
            // Logic: 1/5000 Solar, 1/15000 Chromatic
            let rand = Math.random() * 15000;
            if (rand < 1) p.inv.Chromatic++;
            else if (rand < 3) p.inv.Solar++; // Simplified for demo
            else p.inv.Common++;
            updateUI();
        }

        function brewPotion() {
            if(p.inv.Common >= 10) {
                p.inv.Common -= 10;
                alert("Brewed Lucky Potion!");
            } else alert("Need 10 Commons!");
        }

        function prestige() {
            if(p.rolls >= 10000) {
                p.rolls = 0;
                p.prestige++;
                alert("Ascended! Luck increased.");
                updateUI();
            } else alert("Need 10,000 rolls!");
        }

        function updateSaveCodeDisplay() {
            const code = btoa(encodeURIComponent(JSON.stringify({ player: p })));
            document.getElementById("save-code-box").value = code;
        }

        function copySaveCode() {
            document.getElementById("save-code-box").select();
            document.execCommand("copy");
        }

        function importFromCode() {
            let data = prompt("Paste code:");
            if (!data) return;
            try {
                let parsed = JSON.parse(decodeURIComponent(atob(data.trim())));
                Object.assign(p, parsed.player);
                updateUI();
            } catch(e) { alert("Invalid Code"); }
        }

        init();
    </script>
</body>
</html>
