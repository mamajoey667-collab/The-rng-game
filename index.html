<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sol's RNG - Restored Engine</title>
    <style>
        body { font-family: sans-serif; background: #121214; color: #e1e1e6; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: auto; }
        .panel { background: #1a1a1e; padding: 15px; border-radius: 8px; border: 1px solid #2e2e35; }
        .item { background: #252529; padding: 10px; margin: 5px 0; border-radius: 4px; display: flex; justify-content: space-between; }
        button { background: #6200ee; color: #fff; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <h2 id="display-nickname">Player</h2>
    <p>Rolls: <span id="r-count">0</span> | Luck: <span id="r-luck">1.0</span>x</p>

    <div class="grid">
        <div class="panel">
            <div id="a-name" style="font-size: 2rem; font-weight: bold; margin-bottom: 20px;">Ready</div>
            <button id="roll-btn" onclick="startRoll()" style="width: 100%;">ROLL</button>
        </div>

        <div class="panel">
            <h3>Inventory & Cloud</h3>
            <textarea id="save-code-box" style="width: 100%; height: 50px; background: #222; color: #00ffcc; font-size: 0.7rem;"></textarea>
            <button onclick="copySaveCode()">📋 Copy</button>
            <button onclick="importFromCode()">📥 Load</button>
            <div id="inv-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        let p = { nickname: "Player", rolls: 0, inv: { Common: 0, Solar: 0, Chromatic: 0 } };

        function startRoll() {
            p.rolls++;
            let rand = Math.random() * 15000;
            let result = "Common";
            if (rand < 1) result = "Chromatic";
            else if (rand < 3) result = "Solar";
            
            p.inv[result]++;
            document.getElementById("a-name").textContent = result;
            document.getElementById("r-count").textContent = p.rolls;
            renderInventory();
            updateSaveCodeDisplay();
        }

        function renderInventory() {
            const list = document.getElementById("inv-list");
            list.innerHTML = "";
            for (let item in p.inv) {
                if (p.inv[item] > 0) {
                    list.innerHTML += `<div class="item"><span>${item}</span><span>x${p.inv[item]}</span></div>`;
                }
            }
        }

        function updateSaveCodeDisplay() {
            document.getElementById("save-code-box").value = btoa(JSON.stringify(p));
        }

        function copySaveCode() {
            document.getElementById("save-code-box").select();
            document.execCommand("copy");
        }

        function importFromCode() {
            let data = prompt("Paste your code:");
            if (!data) return;
            try {
                p = JSON.parse(atob(data));
                document.getElementById("r-count").textContent = p.rolls;
                renderInventory();
                updateSaveCodeDisplay();
            } catch(e) { alert("Invalid Code"); }
        }

        // Initialize
        renderInventory();
    </script>
</body>
</html>
